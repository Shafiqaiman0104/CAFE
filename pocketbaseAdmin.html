<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRPOS | VentureRush Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .active-nav { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white !important; box-shadow: 0 4px 15px -1px rgba(59, 130, 246, 0.4); }
        .active-nav span, .active-nav i { color: white !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 font-sans leading-normal tracking-normal overflow-x-hidden min-h-screen text-slate-800">

    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar Backdrop (Mobile) -->
        <div id="sidebar-backdrop" onclick="toggleSidebar(false)" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden md:hidden"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="bg-white/90 backdrop-blur-xl border-r border-slate-200 fixed inset-y-0 left-0 z-50 w-72 h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:sticky md:top-0 md:h-screen">
            <div class="flex flex-col h-full">
                <div class="p-8 text-slate-900 text-2xl font-black border-b border-slate-100 flex justify-between items-center">
                    <span class="tracking-tighter">VR<span class="text-blue-600">POS</span></span>
                    <button onclick="toggleSidebar(false)" class="md:hidden text-slate-400 hover:text-slate-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <ul class="list-reset flex flex-col py-6 px-4 flex-grow space-y-2">
                    <li>
                        <a href="#" onclick="switchTab('REGISTER_LIST')" id="nav-REGISTER_LIST" class="flex items-center p-4 rounded-2xl text-slate-500 font-bold transition-all duration-200 hover:bg-slate-100 active-nav">
                            <i class="fas fa-list-ul mr-4"></i><span class="text-sm md:text-base">Register List</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="switchTab('CLIENT')" id="nav-CLIENT" class="flex items-center p-4 rounded-2xl text-slate-500 font-bold transition-all duration-200 hover:bg-slate-100">
                            <i class="fas fa-id-card mr-4"></i><span class="text-sm md:text-base">Client List</span>
                        </a>
                    </li>
                </ul>
                <div class="p-6 border-t border-slate-100">
                    <p class="text-[10px] uppercase tracking-widest font-black text-slate-400">VentureRush Tech</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content flex-1 min-h-screen">
            <!-- Mobile Header -->
            <header class="bg-white/80 backdrop-blur-md text-slate-900 border-b border-slate-200 md:hidden p-5 flex items-center justify-between sticky top-0 z-30 shadow-sm">
                <span class="font-black text-xl tracking-tighter">VR<span class="text-blue-600">POS</span></span>
                <button onclick="toggleSidebar(true)" class="p-2 text-slate-500">
                    <i class="fas fa-bars fa-lg"></i>
                </button>
            </header>

            <div class="px-4 md:px-10 pt-6 md:pt-12 pb-4">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h3 id="page-title" class="text-3xl font-black text-slate-900 tracking-tight">Register List</h3>
                        <p class="text-slate-500 text-sm mt-1">Manage your registrations and active client database.</p>
                    </div>
                    <div>
                        <button onclick="openModal()" class="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 md:py-4 px-8 rounded-2xl shadow-xl shadow-slate-200 transition-all duration-200 active:scale-95 flex items-center justify-center">
                            <i class="fas fa-plus mr-3"></i> Add New Record
                        </button>
                    </div>
                </div>
            </div>

            <div class="px-4 md:px-10 pb-12">
                <!-- Table Container -->
                <div class="glass-panel rounded-3xl md:rounded-[2.5rem] shadow-2xl shadow-slate-200/50 overflow-hidden border border-white mt-4">
                    <div class="overflow-x-auto">
                        <table class="min-w-full leading-normal table-auto">
                            <thead id="table-head" class="bg-slate-50/50 border-b border-slate-100">
                                <!-- Headers injected here -->
                            </thead>
                            <tbody id="table-body">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Create/Update -->
    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden overflow-y-auto z-50 p-4">
        <div class="min-h-full flex items-center justify-center py-8">
            <div class="relative w-full max-w-2xl shadow-2xl rounded-3xl md:rounded-[2.5rem] bg-white border border-slate-100 animate-in fade-in zoom-in duration-300 overflow-hidden flex flex-col max-h-[90vh]">
                <div class="p-6 md:p-10 overflow-y-auto flex-1">
                    <h3 class="text-2xl font-black text-slate-900" id="modal-title">Add New Record</h3>
                    <form id="record-form" class="mt-6 md:mt-8 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        <!-- Form fields injected here -->
                    </form>
                </div>
                <div class="p-6 md:p-10 pt-4 bg-slate-50/50 border-t border-slate-100">
                    <div class="flex flex-col-reverse md:flex-row justify-end gap-3">
                        <button onclick="closeModal()" class="w-full md:w-auto px-8 py-3.5 bg-white text-slate-600 border border-slate-200 text-base font-bold rounded-2xl hover:bg-slate-50 transition-colors">
                            Cancel
                        </button>
                        <button id="save-btn" onclick="saveRecord(event)" class="w-full md:w-auto px-12 py-3.5 bg-blue-600 text-white text-base font-bold rounded-2xl shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">
                            Save
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Fetching from Register List -->
    <div id="fetch-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden overflow-y-auto z-[60] p-4">
        <div class="min-h-full flex items-center justify-center py-8">
            <div class="relative w-full max-w-4xl shadow-2xl rounded-3xl md:rounded-[2.5rem] bg-white border border-slate-100 animate-in fade-in zoom-in duration-300 overflow-hidden flex flex-col max-h-[90vh]">
                <div class="p-6 md:p-10 flex flex-col flex-1 overflow-hidden">
                <div class="flex justify-between items-center pb-5 border-b border-slate-100 mb-6">
                    <h3 class="text-xl md:text-2xl font-black text-slate-900">Select from Register List</h3>
                    <button onclick="closeFetchModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:text-slate-600 transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="overflow-auto rounded-2xl border border-slate-100">
                    <table class="min-w-full leading-normal relative">
                        <thead>
                            <tr>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Restaurant</th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Owner</th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Status</th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-right text-xs font-semibold text-gray-600 uppercase tracking-wider">Action</th>
                            </tr>
                        </thead>
                        <tbody id="fetch-table-body">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        const pb = new PocketBase('http://pocketbase.mkrimbacamp-vr.com:8090');
        let currentTab = 'REGISTER_LIST'; // Defaults to VRPOS_REGISTER_LIST
        let editingId = null;

        const schemas = {
            'REGISTER_LIST': {
                collection: 'VRPOS_REGISTER_LIST',
                title: 'Register List',
                fields: [
                    { name: 'ownerName', label: 'Owner Name', type: 'text' },
                    { name: 'ownerPhone', label: 'Owner Phone', type: 'number' },
                    { name: 'ownerEmail', label: 'Owner Email', type: 'email' },
                    { name: 'SSM', label: 'SSM', type: 'text' },
                    { name: 'restaurantName', label: 'Restaurant Name', type: 'text' },
                    { name: 'restaurantPhone', label: 'Restaurant Phone', type: 'number' },
                    { name: 'restaurantAddress', label: 'Restaurant Address', type: 'text' },
                    { name: 'status', label: 'Status', type: 'select', options: ['pending', 'preparing', 'completed', 'cancelled'] }
                ]
            },
            'CLIENT': {
                collection: 'VRPOS_CLIENT',
                title: 'Client List',
                fields: [
                    { name: 'clientId', label: 'Client ID', type: 'text' },
                    { name: 'ownerName', label: 'Owner Name', type: 'text' },
                    { name: 'ownerPhone', label: 'Owner Phone', type: 'number' },
                    { name: 'ownerEmail', label: 'Owner Email', type: 'email' },
                    { name: 'SSM', label: 'SSM', type: 'text' },
                    { name: 'restaurantName', label: 'Restaurant Name', type: 'text' },
                    { name: 'restaurantPhone', label: 'Restaurant Phone', type: 'number' },
                    { name: 'restaurantAddress', label: 'Restaurant Address', type: 'text' },
                    { name: 'status', label: 'Status', type: 'select', options: ['pending', 'active', 'unactive'] },
                    { name: 'licenseKey', label: 'License Key', type: 'text' },
                    { name: 'expiredLicenseKey', label: 'Expiry Date', type: 'datetime-local' },
                    { name: 'firestoreEmail', label: 'Firestore Email', type: 'email' },
                    { name: 'firestorePass', label: 'Firestore Pass', type: 'password' },
                    { name: 'firebaseConfig', label: 'Firebase Config', type: 'textarea' }
                ]
            }
        };

        async function fetchData() {
            const schema = schemas[currentTab];
            try {
                const records = await pb.collection(schema.collection).getFullList({
                    sort: '-created',
                });
                renderTable(records);
            } catch (err) {
                console.error("Error fetching data:", err);
                alert("Failed to load data. Check console for details.");
            }
        }

        function renderTable(records) {
            const schema = schemas[currentTab];
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            const tableEl = head.closest('table');

            // Force horizontal scroll for long data tables on tablet/pc
            if (currentTab === 'CLIENT') {
                tableEl.style.minWidth = '1400px';
            } else {
                tableEl.style.minWidth = '100%';
            }
            
            // Only show the first 8 columns for the Client List to keep the layout clean
            const fieldsToDisplay = currentTab === 'CLIENT' ? schema.fields.slice(0, 8) : schema.fields;

            // Set Headers
            let headerHtml = '<tr>';
            fieldsToDisplay.forEach(f => {
                headerHtml += `<th class="px-4 md:px-6 py-4 text-left text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">${f.label}</th>`;
            });
            headerHtml += `<th class="px-4 md:px-6 py-4 text-right text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest">Actions</th></tr>`;
            head.innerHTML = headerHtml;

            // Set Body
            body.innerHTML = '';
            records.forEach(record => {
                let rowHtml = '<tr>';
                fieldsToDisplay.forEach(f => {
                    let val = record[f.name] || '-';
                    let cellClass = "text-slate-600 font-medium";
                    
                    if (f.type === 'datetime-local' && val) val = new Date(val).toLocaleString();
                    if (f.type === 'password' && val !== '-') val = '••••••••';
                    if (f.type === 'textarea' && val !== '-' && val.length > 40) val = val.substring(0, 40) + '...';
                    
                    if (f.name === 'status') {
                        const colors = { 'pending': 'bg-orange-50 text-orange-600', 'active': 'bg-green-50 text-green-600', 'completed': 'bg-blue-50 text-blue-600', 'unactive': 'bg-slate-100 text-slate-500', 'cancelled': 'bg-red-50 text-red-600' };
                        val = `<span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${colors[val] || 'bg-slate-100'}">${val}</span>`;
                    } else if (f.name === 'restaurantName') {
                        cellClass = "text-slate-900 font-bold";
                    }
                    rowHtml += `<td class="px-4 md:px-6 py-5 border-b border-slate-50 bg-white text-xs md:text-sm ${cellClass}"><p class="whitespace-no-wrap">${val}</p></td>`;
                });
                
                rowHtml += `
                    <td class="px-4 md:px-6 py-5 border-b border-slate-50 bg-white text-sm text-right whitespace-nowrap">
                        <button onclick="editRecord('${record.id}')" class="text-blue-500 hover:text-blue-700 mr-4 transition-colors"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRecord('${record.id}')" class="text-red-600 hover:text-red-900"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
                body.innerHTML += rowHtml;
            });
        }

        function toggleSidebar(open) {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            if (open) {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('page-title').innerText = schemas[tab].title;
            
            // Update UI Active State
            document.querySelectorAll('[id^="nav-"]').forEach(el => el.classList.remove('active-nav'));
            document.getElementById(`nav-${tab}`).classList.add('active-nav');
            toggleSidebar(false);
            fetchData();
        }

        function openModal(id = null) {
            editingId = id;
            const schema = schemas[currentTab];
            const form = document.getElementById('record-form');
            const title = document.getElementById('modal-title');
            
            title.innerText = id ? `Edit ${schema.title}` : `Add New ${schema.title}`;
            form.innerHTML = '';

            if (currentTab === 'CLIENT' && !id) {
                form.innerHTML += `
                    <div class="md:col-span-2 mb-2">
                        <button type="button" onclick="openFetchRegisterModal()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-2xl shadow-lg shadow-emerald-100 transition-all active:scale-[0.98]">
                            <i class="fas fa-file-import mr-2"></i> Fetch from Register List
                        </button>
                    </div>`;
            }

            schema.fields.forEach(field => {
                const colSpan = field.type === 'textarea' ? 'md:col-span-2' : '';
                let input = '';
                
                if (field.type === 'textarea') {
                    input = `<textarea name="${field.name}" id="field-${field.name}" class="mt-2 block w-full rounded-2xl border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 sm:text-sm border p-3.5 transition-all outline-none" rows="3"></textarea>`;
                } else if (field.type === 'select') {
                    input = `<select name="${field.name}" id="field-${field.name}" class="mt-2 block w-full rounded-2xl border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 sm:text-sm border p-3.5 transition-all outline-none">
                        ${field.options.map(opt => `<option value="${opt}">${opt.charAt(0).toUpperCase() + opt.slice(1)}</option>`).join('')}
                    </select>`;
                } else {
                    input = `<input type="${field.type}" name="${field.name}" id="field-${field.name}" required class="mt-2 block w-full rounded-2xl border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 sm:text-sm border p-3.5 transition-all outline-none">`;
                }

                form.innerHTML += `
                    <div class="${colSpan}">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">${field.label}</label>
                        ${input}
                    </div>
                `;
            });

            if (id) {
                loadRecordIntoForm(id);
            }

            document.getElementById('modal').classList.remove('hidden');
        }

        async function loadRecordIntoForm(id) {
            try {
                const record = await pb.collection(schemas[currentTab].collection).getOne(id);
                schemas[currentTab].fields.forEach(field => {
                    const el = document.getElementById(`field-${field.name}`);
                    if (el) {
                        let val = record[field.name];
                        if (field.type === 'datetime-local' && val) {
                            // Robust format for datetime-local input: YYYY-MM-DDThh:mm
                            const date = new Date(val);
                            const year = date.getFullYear();
                            const month = String(date.getMonth() + 1).padStart(2, '0');
                            const day = String(date.getDate()).padStart(2, '0');
                            const hours = String(date.getHours()).padStart(2, '0');
                            const minutes = String(date.getMinutes()).padStart(2, '0');
                            val = `${year}-${month}-${day}T${hours}:${minutes}`;
                        }
                        el.value = val || '';
                    }
                });
            } catch (err) {
                console.error(err);
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            editingId = null;
        }

        function closeFetchModal() {
            document.getElementById('fetch-modal').classList.add('hidden');
        }

        async function openFetchRegisterModal() {
            const body = document.getElementById('fetch-table-body');
            body.innerHTML = '<tr><td colspan="4" class="text-center py-4">Loading...</td></tr>';
            document.getElementById('fetch-modal').classList.remove('hidden');

            try {
                const records = await pb.collection('VRPOS_REGISTER_LIST').getFullList({ sort: '-created' });
                body.innerHTML = '';
                records.forEach(r => {
                    body.innerHTML += `
                        <tr>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <p class="text-gray-900 font-bold">${r.restaurantName || '-'}</p>
                                <p class="text-gray-600 text-xs">${r.SSM || '-'}</p>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <p class="text-gray-900">${r.ownerName || '-'}</p>
                                <p class="text-gray-600 text-xs">${r.ownerEmail || '-'}</p>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <span class="px-2 py-1 font-semibold leading-tight text-orange-700 bg-orange-100 rounded-full text-xs uppercase">${r.status}</span>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-right">
                                <button onclick="selectRegisterRecord('${r.id}')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold shadow">Select</button>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                console.error(err);
                body.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-red-500">Error loading data.</td></tr>';
            }
        }

        async function selectRegisterRecord(id) {
            try {
                const r = await pb.collection('VRPOS_REGISTER_LIST').getOne(id);
                const mappings = {
                    'ownerName': r.ownerName,
                    'ownerPhone': r.ownerPhone,
                    'ownerEmail': r.ownerEmail,
                    'SSM': r.SSM,
                    'restaurantName': r.restaurantName,
                    'restaurantPhone': r.restaurantPhone,
                    'restaurantAddress': r.restaurantAddress
                };
                for (const [field, value] of Object.entries(mappings)) {
                    const el = document.getElementById(`field-${field}`);
                    if (el) el.value = value || '';
                }
                closeFetchModal();
            } catch (err) {
                console.error(err);
                alert("Error fetching selected record.");
            }
        }

        async function saveRecord(e) {
            e.preventDefault();
            const schema = schemas[currentTab];
            const formData = new FormData(document.getElementById('record-form'));
            const data = {};
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let isValid = true;
            
            schema.fields.forEach(f => {
                let val = formData.get(f.name);

                // Email validation check
                if (f.type === 'email' && val && !emailRegex.test(val)) {
                    alert(`Please enter a valid email address for ${f.label}`);
                    isValid = false;
                    return;
                }

                if (f.type === 'number') val = parseFloat(val);
                data[f.name] = val;
            });

            if (!isValid) return;

            try {
                if (editingId) {
                    await pb.collection(schema.collection).update(editingId, data);
                } else {
                    await pb.collection(schema.collection).create(data);
                }
                closeModal();
                fetchData();
            } catch (err) {
                console.error("Save failed:", err);
                alert("Error saving record: " + (err.data?.message || err.message));
            }
        }

        async function deleteRecord(id) {
            if (!confirm('Are you sure you want to delete this record?')) return;
            
            try {
                await pb.collection(schemas[currentTab].collection).delete(id);
                fetchData();
            } catch (err) {
                console.error("Delete failed:", err);
                alert("Error deleting record.");
            }
        }

        function editRecord(id) {
            openModal(id);
        }

        // Initial Load
        window.onload = () => {
            fetchData();
        };
    </script>
</body>
</html>
